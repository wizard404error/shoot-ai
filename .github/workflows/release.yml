name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          $env:PYTHONPATH="src"
          python -m pytest tests/unit/ --ignore=tests/unit/test_audio_service.py -q --tb=short

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: python build_release.py --exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KawkabAI-Windows
          path: dist/KawkabAI.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: python build_release.py --exe
      - name: Build DMG
        run: bash build_dmg.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KawkabAI-macOS
          path: dist/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KawkabAI-Windows/KawkabAI.exe
            KawkabAI-macOS/*.dmg
          generate_release_notes: true
