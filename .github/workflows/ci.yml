name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1-5"

env:
  PYTHONPATH: src

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: ruff lint
        run: ruff check src/ tests/ --ignore E501
      - name: ruff format check
        run: ruff format --check src/ tests/

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libsndfile1 ffmpeg
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,cloud]"
      - name: Run unit tests (core analytical)
        env:
          KAWKAB_JWT_SECRET: ci-test-secret-do-not-use-in-production
        run: |
          python -m pytest tests/unit/ \
            --ignore=tests/unit/test_audio_service.py \
            --ignore=tests/unit/test_cv_service_model_manager.py \
            --ignore=tests/unit/test_kalman_and_match_type.py \
            --ignore=tests/unit/test_professional_services.py \
            --ignore=tests/unit/test_cv_service.py \
            --ignore=tests/unit/test_enhancement_service.py \
            --ignore=tests/unit/test_weather_image_classifier.py \
            --ignore=tests/unit/test_batch_service.py \
            --ignore=tests/unit/test_benchmark_service.py \
            --ignore=tests/unit/test_api_services.py \
            --ignore=tests/unit/test_easy_soccer_service.py \
            --ignore=tests/unit/test_llm_service.py \
            --ignore=tests/unit/test_reasoning_outside.py \
            --ignore=tests/unit/test_reasoning_service.py \
            --ignore=tests/unit/test_storage_service.py \
            --ignore=tests/unit/test_bridge_handlers.py \
            --ignore=tests/unit/test_api_external_services.py \
            --ignore=tests/unit/test_core_missing.py \
            --ignore=tests/unit/test_visualization_service.py \
            --ignore=tests/unit/test_health_endpoints.py \
            -v --tb=short -q

  regression:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scikit-learn httpx torch --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Download ground truth data
        run: python scripts/download_ground_truth.py --statsbomb --output data/ground_truth
      - name: Run regression tests
        run: python -m pytest tests/unit/test_regression_xg_models.py -v --tb=short

  server:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,cloud]"
      - name: Run server tests
        env:
          KAWKAB_JWT_SECRET: ci-test-secret-do-not-use-in-production
        run: python -m pytest tests/unit/test_oauth.py tests/unit/test_oauth_api.py tests/unit/test_health_endpoints.py -v --tb=short -q

  benchmark:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,cloud]"
      - name: Run benchmark tests
        if: github.event_name == 'schedule'
        run: python -m pytest tests/unit/test_performance_benchmarks.py --run-load -v --tb=short
