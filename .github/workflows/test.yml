name: CI — Tests, Lint, Typecheck, Benchmark, Coverage

on:
  push:
    branches: [main, develop, 'feature/**', 'sprint/**']
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src
  UV_CACHE_DIR: .uv-cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --only-dev
      - name: ruff
        run: uv run ruff check src/ tests/
      - name: black
        run: uv run black --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --only-dev
      - name: mypy
        run: uv run mypy src/ --ignore-missing-imports

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --only-dev
      - name: Run pytest
        run: |
          python -m pytest tests/unit/test_core_events.py tests/unit/test_xg_model.py tests/unit/test_pitch_control.py tests/unit/test_player_rating.py tests/unit/test_formation_analysis.py tests/unit/test_offball_metrics.py tests/unit/test_substitution_analysis.py tests/unit/test_export_converters.py tests/unit/test_season_aggregator.py tests/unit/test_analysis_service_xg_xt.py tests/unit/test_analysis_service_extensions.py tests/unit/test_xt_model.py tests/unit/test_pass_network.py tests/unit/test_heatmap.py tests/unit/test_tactical_periods.py tests/unit/test_game_state.py tests/unit/test_security.py tests/unit/test_xa_model.py tests/unit/test_benchmarks.py tests/unit/test_match_timeline.py tests/unit/test_migration_manager.py tests/unit/test_logging.py tests/unit/test_win_probability.py tests/unit/test_psxg_model.py tests/unit/test_momentum.py tests/unit/test_defensive_actions.py tests/unit/test_transitions.py tests/unit/test_vaep.py tests/unit/test_set_piece_analysis.py tests/unit/test_storage_service.py tests/unit/test_coding_handler.py tests/unit/test_cv_service.py tests/unit/test_api_external_services.py tests/e2e/test_e2e_pipeline.py tests/e2e/test_e2e_full_pipeline.py -v --tb=short
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: pytest-results/
          if-no-files-found: ignore

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --only-dev
      - name: Run benchmarks
        run: python -m kawkab benchmark --output benchmark-results.json || echo "Benchmark suite incomplete"
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --only-dev
      - name: Run coverage
        run: |
          python -m pytest tests/unit/ --ignore=tests/unit/test_audio_service.py -q --cov=src/kawkab --cov-report=xml --cov-report=term
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
